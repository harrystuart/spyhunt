<!doctype html>
<html>
  <head>
    <title>Spyfall</title>
  </head>
  <body>
    <h1>Spyfall</h1>

    <input id="name" placeholder="Username" />
    <input id="email" placeholder="Email" />

    <button id="create-room">Create room</button>

    <input id="room-code" placeholder="Room code" />
    <button id="join-room">Join room</button>

    <button id="start-game">Start game</button>
    <button id="leave-room">Leave room</button>

    <p id="status"></p>

    <h2>Your role</h2>
    <p id="role"></p>

    <h2>Turn</h2>
    <p id="turn"></p>

    <h2>Result</h2>
    <p id="result"></p>

    <h2>Belief update</h2>
    <p id="belief-update"></p>

    <p id="belief-questioner-line">Does the questioner seem more or less like a spy?</p>
    <select id="questioner-belief">
      <option value="">blank</option>
      <option value="--">--</option>
      <option value="-">-</option>
      <option value="N">N</option>
      <option value="+">+</option>
      <option value="++">++</option>
    </select>

    <p id="belief-answerer-line">Does the answerer seem more or less like a spy?</p>
    <select id="answerer-belief">
      <option value="">blank</option>
      <option value="--">--</option>
      <option value="-">-</option>
      <option value="N">N</option>
      <option value="+">+</option>
      <option value="++">++</option>
    </select>

    <button id="submit-belief-update">Submit belief update</button>

    <h2>Spy guess</h2>
    <select id="spy-guess-location"></select>
    <button id="spy-guess">Guess location</button>

    <h2>Accusation</h2>
    <p id="accusation"></p>
    <button id="vote-yes">Vote yes</button>
    <button id="vote-no">Vote no</button>

    <h3>Start accusation</h3>
    <select id="accused"></select>
    <button id="start-accusation">Accuse</button>

    <h2>Players</h2>
    <ul id="players"></ul>

    <h2>Q&A</h2>
    <ul id="messages"></ul>

    <select id="answerer"></select>
    <input id="chat-message" placeholder="Message" />
    <button id="send-chat-message">Send</button>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
